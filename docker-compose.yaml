version: '3.8'

services:
  web:
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    expose:
      - '80'
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/web/crontabs:/var/spool/cron/crontabs:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
    environment:
      - PUBLIC_URL
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_BOSH_URL_BASE
      - XMPP_MUC_DOMAIN
      - XMPP_GUEST_DOMAIN
      - XMPP_PORT
      - XMPP_RECORDER_DOMAIN
      - ENABLE_XMPP_WEBSOCKET
      - ENABLE_HTTP_REDIRECT
      - ENABLE_LETSENCRYPT
      - ENABLE_GUESTS
      - ENABLE_AUTH
      - ENABLE_RECORDING
      - ENABLE_PREJOIN_PAGE
      - ENABLE_WELCOME_PAGE
      - ENABLE_CLOSE_PAGE
      - ENABLE_P2P
      - DISABLE_HTTPS
      - TZ
    networks:
      proxy:
      meet.jitsi:
    depends_on:
      - prosody
      - jvb

  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    expose:
      - '5222'
      - '5269'
      - '5347'
      - '5280'
    volumes:
      - ${CONFIG}/prosody/config:/config:Z
      - ${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
    environment:
      - AUTH_TYPE
      - ENABLE_AUTH
      - ENABLE_GUESTS
      - ENABLE_XMPP_WEBSOCKET
      - ENABLE_LOBBY
      - ENABLE_BREAKOUT_ROOMS
      - ENABLE_RECORDING
      - JICOFO_AUTH_PASSWORD
      - JICOFO_COMPONENT_SECRET
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JIGASI_XMPP_USER
      - JIGASI_XMPP_PASSWORD
      - JIGASI_TRANSCRIBER_PASSWORD
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - PUBLIC_URL
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_GUEST_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_HIDDEN_DOMAIN
      - XMPP_PORT
      - XMPP_RECORDER_DOMAIN
      - TZ
    networks:
      proxy:
      meet.jitsi:
        aliases:
          - ${XMPP_SERVER:-xmpp.meet.jitsi}

  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - AUTH_TYPE
      - ENABLE_AUTH
      - ENABLE_RECORDING
      - JICOFO_AUTH_PASSWORD
      - JICOFO_ENABLE_BRIDGE_HEALTH_CHECKS
      - JICOFO_ENABLE_HEALTH_CHECKS
      - JVB_BREWERY_MUC
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_SERVER
      - XMPP_PORT
      - TZ
    depends_on:
      - prosody
    networks:
      proxy:
      meet.jitsi:

  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - '10000:10000/udp'
      - '4443:4443/tcp'
      - '127.0.0.1:8082:8080'
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - DOCKER_HOST_ADDRESS
      - JVB_ADVERTISE_IPS
      - JVB_AUTH_USER
      - JVB_AUTH_PASSWORD
      - JVB_BREWERY_MUC
      - JVB_PORT
      - JVB_STUN_SERVERS
      - JVB_TCP_HARVESTER_DISABLED
      - JVB_TCP_PORT
      - JVB_TCP_MAPPED_PORT
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_SERVER
      - XMPP_PORT
      - PUBLIC_URL
      - TZ
    depends_on:
      - prosody
    networks:
      meet.jitsi:

networks:
  meet.jitsi:
  proxy:
    external: true
